<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Blob Empire</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
       * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

html, body { 
    width: 100%; 
    height: 100%; 
    font-family: 'Segoe UI', sans-serif; 
    background-color: #010B04;
    color: #f0fdf4; 
    overflow: hidden; 
}

.main-wrapper { 
    display: flex; 
    width: 100%; 
    height: 100vh; 
    padding: 20px; 
    gap: 20px; 
    max-width: 1400px; 
    margin: 0 auto; 
}

.sidebar-left { 
    width: 260px; 
    display: flex; 
    flex-direction: column; 
    gap: 20px; 
}

.branding { 
    padding: 10px 5px; 
    border-bottom: 2px solid #22c55e; 
}

.branding h1 { 
    font-size: 1.8em; 
    font-family: 'Arial Black', sans-serif; 
    color: #ffffff; 
    letter-spacing: -1px; 
}

.branding p { 
    font-size: 0.9em; 
    font-weight: bold; 
    color: #22c55e; 
}

.tab-nav { 
    display: flex; 
    flex-direction: column; 
    gap: 10px; 
}

.tab-btn { 
    width: 100%; 
    padding: 15px; 
    border: 2px solid #1a4a0a; 
    background: #0d2e04; 
    color: #f0fdf4; 
    cursor: pointer; 
    border-radius: 12px; 
    text-align: left; 
    font-weight: 800; 
    transition: 0.2s; 
    display: flex; 
    align-items: center; 
    gap: 12px; 
}

.tab-btn i { 
    font-size: 1.2em; 
    color: #22c55e; 
}

.tab-btn:hover { 
    border-color: #22c55e; 
    background: #1a4a0a; 
}

.tab-btn.active { 
    background: #22c55e; 
    color: #010B04; 
    border-color: #ffffff; 
}

.tab-btn.active i { 
    color: #010B04; 
}

.tab-btn:disabled { 
    opacity: 0.3; 
    cursor: not-allowed; 
}

.content-view { 
    flex: 1; 
    background: #05150a;
    border: 2px solid #22c55e; 
    border-radius: 20px; 
    display: flex; 
    flex-direction: column; 
    padding: 25px; 
    box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
    overflow: hidden; 
}

.tab-content { 
    display: none; 
    height: 100%; 
    flex-direction: column; 
}

.tab-content.active { 
    display: flex; 
}

.announcement-bar { 
    background: #22c55e; 
    color: #010B04; 
    padding: 15px; 
    margin-bottom: 20px; 
    border-radius: 12px; 
    font-weight: 700; 
    display: flex; 
    align-items: center; 
    gap: 12px; 
}

.announcement-bar i { 
    font-size: 1.3em; 
}

.chat-box { 
    flex: 1; 
    overflow-y: auto; 
    margin-bottom: 20px; 
}

.chat-msg { 
    margin-bottom: 12px; 
    padding: 12px 18px; 
    background: rgba(255, 255, 255, 0.05); 
    border-radius: 10px; 
    border: 1px solid #1a4a0a; 
    display: flex; 
    gap: 10px; 
}

.chat-msg b { 
    color: #22c55e; 
}

.input-area { 
    display: flex; 
    gap: 12px; 
    background: #0d2e04; 
    border: 2px solid #22c55e; 
    border-radius: 14px; 
    padding: 12px 20px; 
    align-items: center; 
}

.input-area input { 
    flex: 1; 
    background: none; 
    border: none; 
    color: #ffffff; 
    font-size: 1em; 
    font-weight: 500; 
}

.send-btn { 
    color: #22c55e; 
    cursor: pointer; 
    font-size: 1.4em; 
}

.rules-list { 
    overflow-y: auto; 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
}

.rule-card { 
    padding: 18px; 
    background: rgba(34, 197, 94, 0.1); 
    border: 1px solid #22c55e; 
    border-radius: 12px; 
    display: flex; 
    gap: 15px; 
    align-items: flex-start; 
}

.rule-card i { 
    color: #22c55e; 
    font-size: 1.4em; 
}

.links-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
    gap: 15px; 
}

.link-btn { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    padding: 20px; 
    background: #0d2e04; 
    border: 2px solid #22c55e; 
    border-radius: 12px; 
    color: #ffffff; 
    text-decoration: none; 
    font-weight: 800; 
    transition: 0.2s; 
}

.link-btn:hover { 
    background: #22c55e; 
    color: #010B04; 
}

.members-flex { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 12px; 
}

.member-tag { 
    background: #1a4a0a; 
    border: 1px solid #22c55e; 
    padding: 8px 16px; 
    border-radius: 12px; 
    font-weight: 700; 
    display: flex; 
    align-items: center; 
    gap: 8px; 
}

::-webkit-scrollbar { 
    width: 8px; 
}

::-webkit-scrollbar-thumb { 
    background: #22c55e; 
    border-radius: 10px; 
}

.error-message {
    color: #ef4444;
    padding: 10px;
    background: rgba(239, 68, 68, 0.1);
    border-radius: 8px;
    margin-bottom: 10px;
}
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-left">
        <div class="branding">
            <h1 id="emp-name">BLOB EMPIRE</h1>
            <p id="emp-pronounce"></p>
        </div>

        <nav class="tab-nav">
            <button class="tab-btn active" id="t-chat" onclick="openTab('comms')" disabled><i class="fa-solid fa-message"></i> Chat</button>
            <button class="tab-btn" id="t-members" onclick="openTab('members')" disabled><i class="fa-solid fa-users"></i> Members</button>
            <button class="tab-btn" id="t-links" onclick="openTab('links')" disabled><i class="fa-solid fa-link"></i> Links</button>
            <button class="tab-btn" id="t-rules" onclick="openTab('rules')" disabled><i class="fa-solid fa-book-open"></i> Rules</button>
        </nav>
    </div>

    <div class="content-view">
        <div id="enlist-screen" class="tab-content active" style="justify-content: center; align-items: center; text-align: center;">
            <i class="fa-solid fa-circle-user" style="font-size: 5em; color: #22c55e; margin-bottom: 20px;"></i>
            <h2 style="font-size: 2em; margin-bottom: 10px;">Welcome</h2>
            <p style="margin-bottom: 25px; font-weight: 600; opacity: 0.7;">Pick a username to enter the empire.</p>
            <div class="input-area" style="width: 350px;">
                <input type="text" id="eName" placeholder="Username..." maxlength="50">
                <i class="fa-solid fa-arrow-right-to-bracket send-btn" onclick="enlist()"></i>
            </div>
            <div id="enlist-error" class="error-message" style="display: none; margin-top: 15px; width: 350px;"></div>
        </div>

        <div id="comms" class="tab-content">
            <div class="announcement-bar" id="a-bar" style="display: none;">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="announcement-text"></span>
            </div>
            <div id="chat" class="chat-box"></div>
            <div class="input-area">
                <input type="text" id="cMsg" placeholder="Write a message..." maxlength="500" onkeypress="if(event.key === 'Enter') send()">
                <i class="fa-solid fa-paper-plane send-btn" onclick="send()"></i>
            </div>
        </div>

        <div id="members" class="tab-content">
            <h2 style="margin-bottom: 25px;">Current Members</h2>
            <div id="member-list" class="members-flex"></div>
        </div>

        <div id="links" class="tab-content">
            <h2 style="margin-bottom: 25px;">Useful Links</h2>
            <div class="links-grid" id="dynamic-links"></div>
        </div>

        <div id="rules" class="tab-content">
            <h2 style="margin-bottom: 25px;">Group Rules</h2>
            <div id="rules-list" class="rules-list"></div>
        </div>
    </div>
</div>

<script>
    function escapeHTML(text) {
        if (typeof text !== 'string') {
            return '';
        }
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;',
            '/': '&#x2F;'
        };
        return text.replace(/[&<>"'\/]/g, (char) => map[char]);
    }

    function sanitizeText(text) {
        if (typeof text !== 'string') {
            return '';
        }
        return text
            .replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '')
            .replace(/on\w+\s*=\s*["'][^"']*["']/gi, '')
            .replace(/on\w+\s*=\s*[^\s>]*/gi, '')
            .trim();
    }

    function sanitizeURL(url) {
        if (typeof url !== 'string') {
            return null;
        }
        const trimmedUrl = url.trim().toLowerCase();
        if (trimmedUrl.startsWith('javascript:') || 
            trimmedUrl.startsWith('data:') || 
            trimmedUrl.startsWith('vbscript:') ||
            trimmedUrl.startsWith('file:')) {
            return null;
        }
        if (trimmedUrl.startsWith('http://') || 
            trimmedUrl.startsWith('https://') || 
            trimmedUrl.startsWith('mailto:') ||
            trimmedUrl.startsWith('/') ||
            trimmedUrl.startsWith('.')) {
            return url;
        }
        return null;
    }

    function isValidUsername(username) {
        if (typeof username !== 'string') {
            return false;
        }
        const trimmed = username.trim();
        return /^[a-zA-Z0-9_-]{3,50}$/.test(trimmed);
    }

    function createSafeTextElement(tag, text) {
        const element = document.createElement(tag);
        element.textContent = sanitizeText(text);
        return element;
    }

    let currentUser = localStorage.getItem('empire_user');
    const MAX_MESSAGE_LENGTH = 500;
    const MAX_USERNAME_LENGTH = 50;

    function openTab(name) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        const map = { 'comms': 't-chat', 'members': 't-members', 'links': 't-links', 'rules': 't-rules' };
        document.getElementById(map[name]).classList.add('active');
    }

    function showError(elementId, message) {
        const errorEl = document.getElementById(elementId);
        if (errorEl) {
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }
    }

    function clearError(elementId) {
        const errorEl = document.getElementById(elementId);
        if (errorEl) {
            errorEl.style.display = 'none';
            errorEl.textContent = '';
        }
    }

    async function init() {
        try {
            const config = await safeFetch('/data/config');
            if (!config) return;

            document.getElementById('emp-name').textContent = sanitizeText(config.name || 'BLOB EMPIRE');
            document.getElementById('emp-pronounce').textContent = sanitizeText(config.pronunciation || '');

            if (config.rules && typeof config.rules === 'string') {
                const rulesArray = config.rules.split(/\d+:/).filter(r => r.trim().length > 0);
                const rulesList = document.getElementById('rules-list');
                rulesList.innerHTML = '';
                rulesArray.forEach((rule) => {
                    const ruleCard = document.createElement('div');
                    ruleCard.className = 'rule-card';
                    
                    const icon = document.createElement('i');
                    icon.className = 'fa-solid fa-check-circle';
                    
                    const text = document.createElement('p');
                    text.textContent = sanitizeText(rule.trim());
                    
                    ruleCard.appendChild(icon);
                    ruleCard.appendChild(text);
                    rulesList.appendChild(ruleCard);
                });
            }

            if (config.links && typeof config.links === 'object') {
                const linksArea = document.getElementById('dynamic-links');
                linksArea.innerHTML = '';
                Object.entries(config.links).forEach(([name, url]) => {
                    const safeUrl = sanitizeURL(url);
                    if (!safeUrl) return;
                    
                    const linkBtn = document.createElement('a');
                    linkBtn.className = 'link-btn';
                    linkBtn.href = safeUrl;
                    linkBtn.target = '_blank';
                    linkBtn.rel = 'noopener noreferrer';
                    
                    const icon = document.createElement('i');
                    icon.className = 'fa-solid fa-external-link';
                    
                    const label = document.createElement('span');
                    label.textContent = sanitizeText(name);
                    
                    linkBtn.appendChild(icon);
                    linkBtn.appendChild(document.createTextNode(' '));
                    linkBtn.appendChild(label);
                    linksArea.appendChild(linkBtn);
                });
            }

            const announce = await safeFetch('/data/currentannounce');
            if (announce && announce.text) {
                document.getElementById('announcement-text').textContent = sanitizeText(announce.text);
                document.getElementById('a-bar').style.display = 'flex';
            }

            checkEnlistment();
            updateMembers();
            updateChat();
            setInterval(updateChat, 5000);
        } catch (error) {
            console.error('Initialization error:', error);
        }
    }

    async function safeFetch(url) {
        try {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const contentType = response.headers.get('content-type');
            if (!contentType || !contentType.includes('application/json')) {
                throw new Error('Invalid content type');
            }
            return await response.json();
        } catch (error) {
            console.error(`Fetch error from ${url}:`, error);
            return null;
        }
    }

    function checkEnlistment() {
        if (currentUser && isValidUsername(currentUser)) {
            document.getElementById('enlist-screen').classList.remove('active');
            document.getElementById('comms').classList.add('active');
            ['t-chat', 't-members', 't-links', 't-rules'].forEach(id => {
                document.getElementById(id).disabled = false;
            });
            document.getElementById('t-chat').classList.add('active');
        }
    }

   async function enlist() {
    clearError('enlist-error');
    const usernameInput = document.getElementById('username');
    
    if (!usernameInput) {
        console.error("Element with ID 'username' not found.");
        return;
    }

    const username = usernameInput.value.trim();

    if (!username) {
        showError('enlist-error', 'Username cannot be empty');
        return;
    }

    if (!isValidUsername(username)) {
        showError('enlist-error', 'Username must be 3-50 characters (alphanumeric, underscore, hyphen)');
        return;
    }

    try {
        const res = await safeFetch('/api/enlist', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ username: sanitizeText(username) })
        });

        if (res && res.success) {
            localStorage.setItem('empire_user', sanitizeText(username));
            currentUser = sanitizeText(username);
            usernameInput.value = '';
            checkEnlistment();
        } else {
            showError('enlist-error', res?.error || 'Enlistment failed');
        }
    } catch (error) {
        console.error('Enlistment error:', error);
        showError('enlist-error', 'An error occurred during enlistment');
    }
}
    async function updateMembers() {
        try {
            const list = await safeFetch('/data/members');
            const memberList = document.getElementById('member-list');
            memberList.innerHTML = '';
            
            if (Array.isArray(list)) {
                list.forEach(member => {
                    const memberTag = document.createElement('div');
                    memberTag.className = 'member-tag';
                    
                    const icon = document.createElement('i');
                    icon.className = 'fa-solid fa-user';
                    
                    const name = document.createElement('span');
                    name.textContent = sanitizeText(member);
                    
                    memberTag.appendChild(icon);
                    memberTag.appendChild(document.createTextNode(' '));
                    memberTag.appendChild(name);
                    memberList.appendChild(memberTag);
                });
            }
        } catch (error) {
            console.error('Update members error:', error);
        }
    }

    async function updateChat() {
        try {
            const data = await safeFetch('/data/messages');
            const chat = document.getElementById('chat');
            chat.innerHTML = '';
            
            if (data && typeof data === 'object') {
                Object.values(data).forEach(message => {
                    if (!message || typeof message !== 'object') return;
                    
                    const chatMsg = document.createElement('div');
                    chatMsg.className = 'chat-msg';
                    
                    const username = document.createElement('b');
                    username.textContent = sanitizeText(message.user);
                    
                    const colon = document.createTextNode(': ');
                    
                    const text = document.createElement('span');
                    text.textContent = sanitizeText(message.text);
                    
                    chatMsg.appendChild(username);
                    chatMsg.appendChild(colon);
                    chatMsg.appendChild(text);
                    chat.appendChild(chatMsg);
                });
            }
            chat.scrollTop = chat.scrollHeight;
        } catch (error) {
            console.error('Update chat error:', error);
        }
    }

    async function send() {
        const input = document.getElementById('cMsg');
        const messageText = input.value.trim();

        if (!messageText) return;
        if (!currentUser) {
            console.error('User not authenticated');
            return;
        }

        if (messageText.length > MAX_MESSAGE_LENGTH) {
            alert(`Message exceeds maximum length of ${MAX_MESSAGE_LENGTH} characters`);
            return;
        }

        try {
            const res = await fetch('/api/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: currentUser,
                    message: messageText
                })
            }).then(r => r.json()).catch(() => ({ success: false }));

            if (res && res.success) {
                input.value = '';
                await updateChat();
            } else {
                console.error('Send failed:', res?.error);
            }
        } catch (error) {
            console.error('Send error:', error);
        }
    }

    init();
</script>

</body>
</html>
