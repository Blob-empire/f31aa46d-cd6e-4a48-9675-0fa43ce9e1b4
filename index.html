<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blob Empire</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
       * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

html, body { 
    width: 100%; 
    height: 100%; 
    font-family: 'Segoe UI', sans-serif; 
    background-color: #010B04;
    color: #f0fdf4; 
    overflow: hidden; 
}

.main-wrapper { 
    display: flex; 
    width: 100%; 
    height: 100vh; 
    padding: 20px; 
    gap: 20px; 
    max-width: 1400px; 
    margin: 0 auto; 
}

.sidebar-left { 
    width: 260px; 
    display: flex; 
    flex-direction: column; 
    gap: 20px; 
}

.branding { 
    padding: 10px 5px; 
    border-bottom: 2px solid #22c55e; 
}

.branding h1 { 
    font-size: 1.8em; 
    font-family: 'Arial Black', sans-serif; 
    color: #ffffff; 
    letter-spacing: -1px; 
}

.branding p { 
    font-size: 0.9em; 
    font-weight: bold; 
    color: #22c55e; 
}

.tab-nav { 
    display: flex; 
    flex-direction: column; 
    gap: 10px; 
}

.tab-btn { 
    width: 100%; 
    padding: 15px; 
    border: 2px solid #1a4a0a; 
    background: #0d2e04; 
    color: #f0fdf4; 
    cursor: pointer; 
    border-radius: 12px; 
    text-align: left; 
    font-weight: 800; 
    transition: 0.2s; 
    display: flex; 
    align-items: center; 
    gap: 12px; 
}

.tab-btn i { 
    font-size: 1.2em; 
    color: #22c55e; 
}

.tab-btn:hover { 
    border-color: #22c55e; 
    background: #1a4a0a; 
}

.tab-btn.active { 
    background: #22c55e; 
    color: #010B04; 
    border-color: #ffffff; 
}

.tab-btn.active i { 
    color: #010B04; 
}

.tab-btn:disabled { 
    opacity: 0.3; 
    cursor: not-allowed; 
}

.content-view { 
    flex: 1; 
    background: #05150a;
    border: 2px solid #22c55e; 
    border-radius: 20px; 
    display: flex; 
    flex-direction: column; 
    padding: 25px; 
    box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
    overflow: hidden; 
}

.tab-content { 
    display: none; 
    height: 100%; 
    flex-direction: column; 
}

.tab-content.active { 
    display: flex; 
}

.announcement-bar { 
    background: #22c55e; 
    color: #010B04; 
    padding: 15px; 
    margin-bottom: 20px; 
    border-radius: 12px; 
    font-weight: 700; 
    display: flex; 
    align-items: center; 
    gap: 12px; 
}

.announcement-bar i { 
    font-size: 1.3em; 
}

.chat-box { 
    flex: 1; 
    overflow-y: auto; 
    margin-bottom: 20px; 
}

.chat-msg { 
    margin-bottom: 12px; 
    padding: 12px 18px; 
    background: rgba(255, 255, 255, 0.05); 
    border-radius: 10px; 
    border: 1px solid #1a4a0a; 
    display: flex; 
    gap: 10px; 
}

.chat-msg b { 
    color: #22c55e; 
}

.input-area { 
    display: flex; 
    gap: 12px; 
    background: #0d2e04; 
    border: 2px solid #22c55e; 
    border-radius: 14px; 
    padding: 12px 20px; 
    align-items: center; 
}

.input-area input { 
    flex: 1; 
    background: none; 
    border: none; 
    color: #ffffff; 
    font-size: 1em; 
    font-weight: 500; 
}

.send-btn { 
    color: #22c55e; 
    cursor: pointer; 
    font-size: 1.4em; 
}

.rules-list { 
    overflow-y: auto; 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
}

.rule-card { 
    padding: 18px; 
    background: rgba(34, 197, 94, 0.1); 
    border: 1px solid #22c55e; 
    border-radius: 12px; 
    display: flex; 
    gap: 15px; 
    align-items: flex-start; 
}

.rule-card i { 
    color: #22c55e; 
    font-size: 1.4em; 
}

.links-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
    gap: 15px; 
}

.link-btn { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    padding: 20px; 
    background: #0d2e04; 
    border: 2px solid #22c55e; 
    border-radius: 12px; 
    color: #ffffff; 
    text-decoration: none; 
    font-weight: 800; 
    transition: 0.2s; 
}

.link-btn:hover { 
    background: #22c55e; 
    color: #010B04; 
}

.members-flex { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 12px; 
}

.member-tag { 
    background: #1a4a0a; 
    border: 1px solid #22c55e; 
    padding: 8px 16px; 
    border-radius: 12px; 
    font-weight: 700; 
    display: flex; 
    align-items: center; 
    gap: 8px; 
}

::-webkit-scrollbar { 
    width: 8px; 
}

::-webkit-scrollbar-thumb { 
    background: #22c55e; 
    border-radius: 10px; 
}
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-left">
        <div class="branding">
            <h1 id="emp-name">BLOB EMPIRE</h1>
            <p id="emp-pronounce"></p>
        </div>

        <nav class="tab-nav">
            <button class="tab-btn active" id="t-chat" onclick="openTab('comms')" disabled><i class="fa-solid fa-message"></i> Chat</button>
            <button class="tab-btn" id="t-members" onclick="openTab('members')" disabled><i class="fa-solid fa-users"></i> Members</button>
            <button class="tab-btn" id="t-links" onclick="openTab('links')" disabled><i class="fa-solid fa-link"></i> Links</button>
            <button class="tab-btn" id="t-rules" onclick="openTab('rules')" disabled><i class="fa-solid fa-book-open"></i> Rules</button>
        </nav>
    </div>

    <div class="content-view">
        <div id="enlist-screen" class="tab-content active" style="justify-content: center; align-items: center; text-align: center;">
            <i class="fa-solid fa-circle-user" style="font-size: 5em; color: #22c55e; margin-bottom: 20px;"></i>
            <h2 style="font-size: 2em; margin-bottom: 10px;">Welcome</h2>
            <p style="margin-bottom: 25px; font-weight: 600; opacity: 0.7;">Pick a username to enter the empire.</p>
            <div class="input-area" style="width: 350px;">
                <input type="text" id="eName" placeholder="Username...">
                <i class="fa-solid fa-arrow-right-to-bracket send-btn" onclick="enlist()"></i>
            </div>
        </div>

        <div id="comms" class="tab-content">
            <div class="announcement-bar" id="a-bar">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="announcement-text"></span>
            </div>
            <div id="chat" class="chat-box"></div>
            <div class="input-area">
                <input type="text" id="cMsg" placeholder="Write a message..." onkeypress="if(event.key === 'Enter') send()">
                <i class="fa-solid fa-paper-plane send-btn" onclick="send()"></i>
            </div>
        </div>

        <div id="members" class="tab-content">
            <h2 style="margin-bottom: 25px;">Current Members</h2>
            <div id="member-list" class="members-flex"></div>
        </div>

        <div id="links" class="tab-content">
            <h2 style="margin-bottom: 25px;">Useful Links</h2>
            <div class="links-grid" id="dynamic-links"></div>
        </div>

        <div id="rules" class="tab-content">
            <h2 style="margin-bottom: 25px;">Group Rules</h2>
            <div id="rules-list" class="rules-list"></div>
        </div>
    </div>
</div>

<script>
    let currentUser = localStorage.getItem('empire_user');

    function openTab(name) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        const map = { 'comms': 't-chat', 'members': 't-members', 'links': 't-links', 'rules': 't-rules' };
        document.getElementById(map[name]).classList.add('active');
    }

    async function init() {
        const config = await fetch('/data/config').then(r => r.json());
        document.getElementById('emp-name').innerText = config.name;
        document.getElementById('emp-pronounce').innerText = config.pronunciation;
        
        const rulesArray = config.rules.split(/\d+:/).filter(r => r.trim().length > 0);
        document.getElementById('rules-list').innerHTML = rulesArray.map((r, i) => `
            <div class="rule-card">
                <i class="fa-solid fa-check-circle"></i>
                <p>${r.trim()}</p>
            </div>`).join('');

        const linksArea = document.getElementById('dynamic-links');
        linksArea.innerHTML = Object.entries(config.links).map(([n, u]) => `
            <a href="${u}" target="_blank" class="link-btn">
                <i class="fa-solid fa-external-link"></i> ${n}
            </a>`).join('');

        const announce = await fetch('/data/currentannounce').then(r => r.json());
        if(announce.text) document.getElementById('announcement-text').innerText = announce.text;
        else document.getElementById('a-bar').style.display = 'none';

        checkEnlistment();
        updateMembers();
        updateChat();
        setInterval(updateChat, 5000);
    }

    function checkEnlistment() {
        if (currentUser) {
            document.getElementById('enlist-screen').classList.remove('active');
            document.getElementById('comms').classList.add('active');
            ['t-chat', 't-members', 't-links', 't-rules'].forEach(id => document.getElementById(id).disabled = false);
            document.getElementById('t-chat').classList.add('active');
        }
    }

    async function enlist() {
        const username = document.getElementById('eName').value;
        if(!username) return;
        const res = await fetch('/api/enlist', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username })
        }).then(r => r.json());
        if(res.success) {
            localStorage.setItem('empire_user', username);
            currentUser = username;
            checkEnlistment();
        } else alert(res.error);
    }

    async function updateMembers() {
        const list = await fetch('/data/members').then(r => r.json());
        document.getElementById('member-list').innerHTML = list.map(m => `
            <div class="member-tag">
                <i class="fa-solid fa-user"></i> ${m}
            </div>`).join('');
    }

    async function updateChat() {
        const data = await fetch('/data/messages').then(r => r.json());
        const chat = document.getElementById('chat');
        chat.innerHTML = Object.values(data).map(m => `
            <div class="chat-msg">
                <b>${m.user}:</b> ${m.text}
            </div>`).join('');
        chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
        const input = document.getElementById('cMsg');
        if(!input.value || !currentUser) return;
        const res = await fetch('/api/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: currentUser, message: input.value })
        }).then(r => r.json());
        if(res.success) {
            input.value = '';
            updateChat();
        }
    }

    init();
</script>

</body>
</html>
